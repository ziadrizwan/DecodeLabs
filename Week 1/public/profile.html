  <!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="./profile.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="./Assets/Zizo_graphic_New_Logo.svg" type="image/x-icon">
</head>
  <body class="bodyStyle montserrat-font">

    <div class="container">
       <div class="logoSection buttonSouter">
        <div class="logoutButtonOuter">
          <button class="logoutButton" id="logoutBtn">
            <img class="logoutIcon" src="./Assets/logout-icon.svg" alt="">
          </button>
        </div>  
        
             
          <h1 class="mainHeading">Welcome to Zizo Graphics</h1>
          <p class="mainDetail">Explore our courses and training regarding Graphic Designing or pick our designing services for your interests.</p>
       </div>
    <div class="profileCard">
        <div class="imageFrame">
            <img name="profilePicture" id="profilePic" src="./Assets/user-profile.svg" alt="Profile Picture" >
        </div>
      
        <div class="infoGroup">
          <div class="infoField">
            <div class="label" >
                <p >Name:</p>
            </div>
            <div class="value">
                 <p id="userNameDisplay">Loading...</p>
            </div>
          </div>
          <div class="infoField">
            <div class="label">
                 <p>Email Address:</p>
            </div>
            
            <div class="value">
                <p  id="userEmailDisplay">Loading...</p>
            </div>
          </div>
        </div>
        
        <a class="editLink" href="./EditProfile.html">
        <div class="buttonStyle">
           Edit Profile
        </div>    
        </a>
      </div>  
    </div>
    <script src="profile.js"></script>
  </body>
  </html>
